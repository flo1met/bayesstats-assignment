<section id="title-slide">
  <div class="title-slide-content">
    <hr class="uva-title-rule">
    <h1 class="title">$title$</h1>
$if(subtitle)$    <p class="subtitle">$subtitle$</p>
$endif$    <div class="title-meta">
$for(author)$      <p class="author">$author$</p>
$endfor$$for(institute)$      <p class="institute">$institute$</p>
$endfor$$if(date)$      <p class="date">$date$</p>
$endif$    </div>
  </div>
</section>
